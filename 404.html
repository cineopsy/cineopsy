  <div class="lightbox-caption" id="lightboxCaption"></div>

<script>
// Image Lightbox
function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')}); });

// Auto-attach lightbox to article images
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.article-body img, .article-img-block img, .content-body img').forEach(img => {
    img.classList.add('lightbox-trigger');
    img.addEventListener('click', () => openLightbox(img.src, img.alt));
  });
  
  // Set active bottom nav item
  const path = location.pathname.split('/').pop() || 'index.html';
  const map = {'index.html':'bn-home','news.html':'bn-news','news_article.html':'bn-news','watchlist.html':'bn-watchlist','verdict.html':'bn-verdict','verdict_ep.html':'bn-verdict'};
  const activeId = map[path];
  if (activeId) { const el = document.getElementById(activeId); if(el) el.classList.add('active'); }
});
</script>

<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
<script>
function applyTheme(t){if(t==='light'){document.documentElement.classList.add('light');const b=document.getElementById('themeBtn');if(b)b.innerHTML='☀️';}else{document.documentElement.classList.remove('light');const b=document.getElementById('themeBtn');if(b)b.innerHTML='🌙';}}
function toggleTheme(){const l=document.documentElement.classList.contains('light');localStorage.setItem('cineopsy_theme',l?'dark':'light');applyTheme(l?'dark':'light');}
(function(){applyTheme(localStorage.getItem('cineopsy_theme')||'dark');})();
</script>
