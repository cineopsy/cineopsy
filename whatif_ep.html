<script>
function toggleMenu(){document.getElementById('navLinks').classList.toggle('open');}
// Set active nav link
(function(){
  const links = document.querySelectorAll('.nav-links a');
  const page = location.pathname.split('/').pop() || 'index.html';
  links.forEach(l => { if(l.getAttribute('href') === page) l.classList.add('active'); });
})();
// Reveal on scroll
const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'), i*80); });
},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(r=>obs.observe(r));
</script>

<script>

// ── Firebase Init ──
let db = null;
let firebaseReady = false;
try {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  firebaseReady = true;
} catch(e) { console.warn('Firebase not ready:', e.message); }

// ── Load settings (tagline, social etc) ──
async function loadSiteSettings() {
  if (!firebaseReady) return;
  try {
    // Footer text
    const st = await db.collection('settings').doc('sitetext').get();
    if (st.exists && st.data().footer) {
      const el = document.getElementById('footerCopy');
      if (el) el.textContent = st.data().footer;
    }
    // Theme colors
    const th = await db.collection('settings').doc('theme').get();
    if (th.exists) {
      const d = th.data();
      const root = document.documentElement;
      if (d.red)  root.style.setProperty('--red', d.red);
      if (d.bg)   root.style.setProperty('--black', d.bg);
      if (d.text) root.style.setProperty('--white', d.text);
      if (d.card) root.style.setProperty('--black3', d.card);
    }
  } catch(e) {}
}
loadSiteSettings();


const PLAYLIST_ID = 'whatif';
const EP_LABEL = 'Episode';
const PL_FILE = 'whatif.html';
const EP_FILE = 'whatif_ep.html';

function getParam(n) { return new URLSearchParams(location.search).get(n); }

async function loadEpisode() {
  const id = getParam('id');
  if (!id) { document.getElementById('epTitle').textContent = 'Episode not found'; return; }

  let episodes = [];
  let ep = null;

  try {
    if (firebaseReady) {
      const snap = await db.collection('episodes').doc(PLAYLIST_ID).collection('items')
                           .orderBy('createdAt','asc').get();
      episodes = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      ep = episodes.find(e => e.id === id);
    } else {
      episodes = JSON.parse(localStorage.getItem('co_ep_' + PLAYLIST_ID) || '[]');
      ep = episodes.find(e => String(e.id) === String(id));
    }
  } catch(e) {
    document.getElementById('epTitle').textContent = 'Error loading episode';
    return;
  }

  if (!ep) { document.getElementById('epTitle').textContent = 'Episode not found'; return; }

  const num = episodes.findIndex(e => e.id === ep.id) + 1;
  document.title = ep.title + ' — CinéOpsy';
  document.getElementById('epTitle').textContent = ep.title;
  document.getElementById('epMeta').textContent = EP_LABEL + ' ' + num + (ep.date ? '  ·  ' + ep.date : '');

  // Video
  const vc = document.getElementById('videoContainer');
  if (ep.youtube) {
    let vid = ep.youtube;
    if (vid.includes('watch?v=')) vid = vid.split('watch?v=')[1].split('&')[0];
    else if (vid.includes('youtu.be/')) vid = vid.split('youtu.be/')[1].split('?')[0];
    vc.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen title="${ep.title}"></iframe>`;
  } else {
    vc.innerHTML = `<div class="video-placeholder"><div class="v-icon">🎬</div><p>Video Coming Soon</p></div>`;
  }

  // Info fields
  const ig = document.getElementById('infoGrid');
  if (ep.info && ep.info.length) {
    ig.innerHTML = ep.info.filter(i => i.val).map(i =>
      `<div class="info-box"><div class="info-label">${i.label}</div><div class="info-val">${i.val}</div></div>`
    ).join('');
  }

  // Content
  const cb = document.getElementById('contentBody');
  cb.innerHTML = ep.content
    ? ep.content.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')
    : '<p style="color:var(--gray);font-style:italic">No description added yet.</p>';

  // Related episodes
  const rg = document.getElementById('relatedGrid');
  const related = episodes.filter(e => e.id !== ep.id).slice(-3).reverse();
  if (related.length) {
    rg.innerHTML = related.map(r => {
      const rnum = episodes.findIndex(e => e.id === r.id) + 1;
      return `<a href="${EP_FILE}?id=${r.id}&pl=${PLAYLIST_ID}" class="rel-card">
        <div class="rel-num">${EP_LABEL} ${rnum}</div>
        <div class="rel-title">${r.title}</div>
      </a>`;
    }).join('');
  } else {
    rg.innerHTML = '<p style="color:var(--gray);font-style:italic">No other episodes yet.</p>';
  }
}

loadEpisode();
</script>

<script>
// Theme toggle
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.innerHTML = '☀️ Light';
  } else {
    document.documentElement.classList.remove('light');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.innerHTML = '🌙 Dark';
  }
}
function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const newTheme = isLight ? 'dark' : 'light';
  localStorage.setItem('cineopsy_theme', newTheme);
  applyTheme(newTheme);
}
// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('cineopsy_theme') || 'dark';
  applyTheme(saved);
})();
</script>
