<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">Case — Case Files — CinéOpsy</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
:root{--red:#cc0000;--red-bright:#ff2222;--black:#080808;--black2:#0f0f0f;--black3:#161616;--white:#f0ece4;--gray:#888;--gray-light:#555;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Crimson Pro',Georgia,serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.025;pointer-events:none;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 40px;background:rgba(8,8,8,0.97);border-bottom:1px solid rgba(204,0,0,0.15);}
.nav-logo img{height:52px;object-fit:contain;}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);text-decoration:none;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--red);transition:width 0.3s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{width:24px;height:2px;background:var(--white);transition:0.3s;}
.red-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
.page-wrap{max-width:1100px;margin:0 auto;padding:100px 30px 60px;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.section-label::before{content:'';width:30px;height:1px;background:var(--red);}
.section-title{font-family:'Cinzel',serif;font-size:clamp(24px,4vw,40px);font-weight:700;color:var(--white);margin-bottom:6px;line-height:1.1;}
.section-title span{color:var(--red);}
.section-sub{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;color:var(--gray);margin-bottom:40px;}
.btn-primary{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;background:var(--red);color:var(--white);padding:12px 28px;text-decoration:none;border:1px solid var(--red);transition:all 0.2s;display:inline-block;cursor:pointer;}
.btn-primary:hover{background:var(--red-bright);box-shadow:0 0 20px rgba(204,0,0,0.4);}
.btn-outline{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;background:transparent;color:var(--white);padding:12px 28px;text-decoration:none;border:1px solid rgba(240,236,228,0.3);transition:all 0.2s;display:inline-block;cursor:pointer;}
.btn-outline:hover{border-color:var(--red);color:var(--red);}
footer{border-top:1px solid rgba(255,255,255,0.05);padding:30px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
footer img{height:36px;object-fit:contain;}
.footer-copy{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);}
.footer-tagline{font-family:'Crimson Pro',serif;font-style:italic;font-size:13px;color:rgba(204,0,0,0.5);}
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
.reveal.visible{opacity:1;transform:translateY(0);}
@media(max-width:768px){nav{padding:10px 20px;}.nav-links{display:none;flex-direction:column;position:fixed;top:72px;left:0;right:0;background:rgba(8,8,8,0.98);padding:20px;gap:16px;border-bottom:1px solid rgba(204,0,0,0.2);}.nav-links.open{display:flex;}.hamburger{display:flex;}.page-wrap{padding:90px 16px 40px;}footer{flex-direction:column;text-align:center;padding:20px;}}
</style>


<style>
.ep-hero{padding:90px 0 30px;border-bottom:1px solid rgba(255,255,255,0.06);}
.ep-back{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:24px;transition:color 0.2s;}
.ep-back:hover{color:var(--red);}
.ep-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
.ep-main-title{font-family:'Cinzel',serif;font-size:clamp(22px,4vw,38px);font-weight:700;color:var(--white);line-height:1.2;margin-bottom:12px;}
.ep-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:24px;}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#0a0a0a;border:1px solid rgba(255,255,255,0.06);margin:32px 0;}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.video-placeholder .v-icon{font-size:52px;opacity:0.3;}
.video-placeholder p{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);}
.content-body{font-size:17px;line-height:1.9;color:rgba(240,236,228,0.8);}
.content-body h3{font-family:'Cinzel',serif;font-size:18px;color:var(--white);margin:28px 0 12px;}
.content-body p{margin-bottom:16px;}
.content-body strong{color:var(--white);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2px;margin:32px 0;}
.info-box{background:var(--black3);padding:20px;border:1px solid rgba(255,255,255,0.05);}
.info-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.info-val{font-size:15px;color:var(--white);line-height:1.4;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:20px;}
.rel-card{background:var(--black3);border:1px solid rgba(255,255,255,0.05);padding:18px;text-decoration:none;color:inherit;transition:border-color 0.3s;}
.rel-card:hover{border-color:rgba(204,0,0,0.3);}
.rel-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.rel-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--white);line-height:1.3;}
</style>

<script>
function toggleMenu(){document.getElementById('navLinks').classList.toggle('open');}
// Set active nav link
(function(){
  const links = document.querySelectorAll('.nav-links a');
  const page = location.pathname.split('/').pop() || 'index.html';
  links.forEach(l => { if(l.getAttribute('href') === page) l.classList.add('active'); });
})();
// Reveal on scroll
const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'), i*80); });
},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(r=>obs.observe(r));
</script>


<script>
const PLAYLIST_ID = 'casefiles';
const EP_LABEL = 'Case';

function getParam(name) {
  return new URLSearchParams(location.search).get(name);
}

function loadEpisode() {
  const id = getParam('id');
  const episodes = JSON.parse(localStorage.getItem('cineopsy_' + PLAYLIST_ID) || '[]');
  const ep = episodes.find(e => e.id == id);
  
  if (!ep) {
    document.getElementById('epTitle').textContent = 'Episode not found';
    document.getElementById('contentBody').innerHTML = '<p>This episode does not exist.</p>';
    return;
  }

  const idx = episodes.findIndex(e => e.id == id);
  const num = idx + 1;

  document.title = ep.title + ' — CinéOpsy';
  document.getElementById('epTitle').textContent = ep.title;
  document.getElementById('epMeta').textContent = EP_LABEL + ' ' + num + '  ·  ' + ep.date;

  // Video
  const vc = document.getElementById('videoContainer');
  if (ep.youtube) {
    let vid = ep.youtube;
    if (vid.includes('watch?v=')) vid = vid.split('watch?v=')[1].split('&')[0];
    else if (vid.includes('youtu.be/')) vid = vid.split('youtu.be/')[1].split('?')[0];
    vc.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen title="${ep.title}"></iframe>`;
  } else {
    vc.innerHTML = `<div class="video-placeholder"><div class="v-icon">🎬</div><p>Video Coming Soon</p></div>`;
  }

  // Info grid
  const ig = document.getElementById('infoGrid');
  if (ep.info && ep.info.length) {
    ig.innerHTML = ep.info.map(item => item.val ? `
      <div class="info-box">
        <div class="info-label">${item.label}</div>
        <div class="info-val">${item.val}</div>
      </div>` : '').join('');
  }

  // Content
  const cb = document.getElementById('contentBody');
  cb.innerHTML = ep.content ? ep.content.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('') 
    : '<p style="color:var(--gray);font-style:italic">No description added yet.</p>';

  // Related
  const rg = document.getElementById('relatedGrid');
  const related = episodes.filter(e => e.id != id).slice(-3).reverse();
  if (related.length) {
    rg.innerHTML = related.map((r,i) => {
      const rnum = episodes.findIndex(e=>e.id==r.id)+1;
      return `<a href="casefiles_ep.html?id=${r.id}" class="rel-card">
        <div class="rel-num">${EP_LABEL} ${rnum}</div>
        <div class="rel-title">${r.title}</div>
      </a>`;
    }).join('');
  } else {
    rg.innerHTML = '<p style="color:var(--gray);font-style:italic">No other episodes yet.</p>';
  }
}

loadEpisode();
</script>
</body></html>
