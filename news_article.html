<script>
let db=null,firebaseReady=false;
try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();firebaseReady=true;}catch(e){}

function getParam(n){return new URLSearchParams(location.search).get(n);}

function parseContent(content, images) {
  if (!content) return '<p style="color:var(--gray);font-style:italic">No content yet.</p>';
  // Replace [IMG:url:caption] tags with image blocks
  let html = content;
  if (images && images.length) {
    images.forEach((img, i) => {
      const tag = '[IMG' + i + ']';
      const block = '<div class="article-img-block"><img src="' + img.url + '" alt="' + (img.caption||'') + '" onerror="this.style.display=\'none\'">' +
        (img.caption ? '<div class="article-img-caption">' + img.caption + '</div>' : '') + '</div>';
      html = html.split(tag).join(block);
    });
  }
  // Paragraphs
  return html.split('\n').map(p => p.trim() ? '<p>' + p + '</p>' : '').join('');
}

async function loadArticle() {
  const id = getParam('id');
  if (!id) { document.getElementById('articleContent').innerHTML = '<p>Article not found.</p>'; return; }
  let article = null, allNews = [];
  try {
    if (firebaseReady) {
      const doc = await db.collection('news').doc(id).get();
      if (doc.exists) article = {...doc.data(), id: doc.id};
      const snap = await db.collection('news').orderBy('createdAt','desc').get();
      allNews = snap.docs.map(d => ({...d.data(), id: d.id}));
    }
  } catch(e) {}
  if (!article) { document.getElementById('articleContent').innerHTML = '<p>Article not found.</p>'; return; }

  document.title = article.title + ' — CinéOpsy';
  const coverImg = article.coverImage
    ? '<img src="' + article.coverImage + '" alt="' + article.title + '" class="article-cover" onerror="this.style.display=\'none\'">'
    : '';
  const tags = (article.tags || []).map(t => '<span class="tag">' + t + '</span>').join('');
  document.getElementById('articleContent').innerHTML =
    '<div class="article-cat">' + (article.category||'Cinema') + '</div>' +
    '<h1 class="article-title">' + article.title + '</h1>' +
    '<div class="article-meta">' + (article.date||'') + (article.author ? '  ·  By ' + article.author : '') + '</div>' +
    coverImg +
    '<div class="article-body">' + parseContent(article.content, article.images) + '</div>' +
    (tags ? '<div class="article-tags">' + tags + '</div>' : '');

  // Related
  const related = allNews.filter(n => n.id !== id).slice(0,3);
  const rg = document.getElementById('relatedGrid');
  if (related.length) {
    rg.innerHTML = related.map(r =>
      '<a href="news_article.html?id=' + r.id + '" class="rel-card">' +
      '<div class="rel-cat">' + (r.category||'Cinema') + '</div>' +
      '<div class="rel-title">' + r.title + '</div></a>'
    ).join('');
  } else {
    rg.innerHTML = '<p style="color:var(--gray);font-style:italic">More news coming soon.</p>';
  }
}
loadArticle();
</script>

<script>
// Theme toggle
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.classList.add('light');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.innerHTML = '☀️ Light';
  } else {
    document.documentElement.classList.remove('light');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.innerHTML = '🌙 Dark';
  }
}
function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const newTheme = isLight ? 'dark' : 'light';
  localStorage.setItem('cineopsy_theme', newTheme);
  applyTheme(newTheme);
}
