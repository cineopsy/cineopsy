<script>
function renderWatchlist(){
  var bks=JSON.parse(localStorage.getItem('co_bk')||'[]');
  var grid=document.getElementById('wlGrid');
  var count=document.getElementById('wlCount');
  if(count)count.textContent=bks.length+' saved item'+(bks.length!==1?'s':'');
  if(!bks.length){
    grid.innerHTML='<div class="wl-empty"><div class="wl-empty-icon">🔖</div><div class="wl-empty-title">Nothing saved yet</div><div class="wl-empty-sub">Click "Save" on any episode or article.</div><a href="index.html" class="btn-primary">Explore Content →</a></div>';
    return;
  }
  grid.innerHTML=bks.slice().reverse().map(function(b){
    var dt=new Date(b.savedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    return '<div class="wl-card"><div style="flex:1"><a href="'+b.url+'" style="text-decoration:none"><div class="wl-title">'+escHtml(b.title)+'</div></a><div class="wl-meta">Saved '+dt+'</div></div><button class="wl-remove" onclick="removeItem(''+b.id+'')">Remove</button></div>';
  }).join('');
}
function removeItem(id){
  var bks=JSON.parse(localStorage.getItem('co_bk')||'[]').filter(function(b){return b.id!==id;});
  localStorage.setItem('co_bk',JSON.stringify(bks));
  renderWatchlist();showToast('Removed from watchlist');
}
function clearAll(){
  if(!confirm('Clear all saved items?'))return;
  localStorage.setItem('co_bk','[]');
  renderWatchlist();showToast('Watchlist cleared');
}
document.addEventListener('DOMContentLoaded',renderWatchlist);
</script>
